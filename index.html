<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hornbill Habitat Model × GIS</title>

<link rel="stylesheet" href="vendor/leaflet/leaflet.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

  <div class="topbar">
    <div class="topbar-bg"></div>
    <div class="topbar-row">
      <div class="topbar-titles">
        <div class="eyebrow">RESEARCH PROTOTYPE</div>
        <div class="title" id="appTitle"></div>
        <div class="subtitle" id="appSubtitle"></div>
      </div>
      <div class="lang-toggle">
        <div id="langEnBtn" data-action="setLang" data-id="en">EN</div>
        <div id="langThBtn" data-action="setLang" data-id="th">TH</div>
      </div>
    </div>
    <div class="topbar-rule"></div>
  </div>

  <div class="grid">

    <div id="colLeft" class="side-col">
      <button type="button" id="toggleLeftBtn" class="col-toggle col-toggle-left" data-action="toggleLeftPanel" title="Collapse">‹</button>
      <div id="colLeftContent"></div>
    </div>

    <div id="colMap">
      <div class="card map-card">
        <div class="panel-head">
          <div class="badge badge-green">05</div>
          <div class="panel-title" id="mapPanelTitle"></div>
        </div>
        <div class="map-tabs">
          <div class="map-tab" id="mapTabDist" data-action="setMapTab" data-id="distribution"></div>
          <div class="map-tab" id="mapTabCompare" data-action="setMapTab" data-id="compare"></div>
        </div>

        <div id="mapWrap" class="map-wrap">
          <div id="leafletMap" style="width:100%;height:420px;border-radius:6px;background:#eae3d0"></div>
          <button id="mapFullscreenBtn" type="button" class="map-fullscreen-btn" data-action="toggleMapFullscreen" title="Toggle fullscreen">⤢</button>
        </div>
        <div id="noResultsBox" class="no-results" style="display:none"></div>

        <div id="mapGradient" class="map-gradient" style="display:none"></div>
        <div id="mapScaleLabels" class="map-scale-labels" style="display:none"></div>
        <div id="mapLegendSpecies" class="map-legend-species"></div>
        <div id="mapRiskNote" class="risk-note" style="display:none"></div>
        <div class="map-note" id="mapRealNote"></div>
      </div>
    </div>

    <div id="colRight" class="side-col">
      <button type="button" id="toggleRightBtn" class="col-toggle col-toggle-right" data-action="toggleRightPanel" title="Collapse">›</button>
      <div id="colRightContent"></div>
    </div>

  </div>
</div>

<script src="vendor/leaflet/leaflet.js"></script>
<script src="vendor/geotiff/geotiff.js"></script>
<script src="js/data.js"></script>
<script src="js/i18n.js"></script>
<script src="js/raster.js"></script>
<script src="js/app.js"></script>
</body>
</html>
